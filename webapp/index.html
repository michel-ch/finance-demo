<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="teal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finch Demo — Personal Finance Cockpit</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-system);height:100%}
  .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
  .mark{width:48px;height:48px;border-radius:12px;background:var(--text-primary);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-0.04em}
  .label{font-size:13px;color:var(--text-tertiary);letter-spacing:0.4px;text-transform:uppercase;font-weight:600}
</style>
</head>
<body>
<div class="splash">
  <div class="mark">ƒ</div>
  <div class="label">Finch</div>
</div>
<script src="auth.js"></script>
<script>
  // First-launch routing.
  // If no profile exists → onboarding.
  // If logged out → login.
  // Otherwise → home.
  (function () {
    var route = FCAuth.firstRoute();
    location.replace(route);
  })();
</script>
</body>
</html>
