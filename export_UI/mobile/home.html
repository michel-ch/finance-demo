<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="teal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finch — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-system)}*{box-sizing:border-box}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../data.js"></script>
<script type="text/babel" src="../components/atoms.jsx"></script>
<script type="text/babel" src="../components/mobile-screens.jsx"></script>
<style>body{background:var(--surface-sunken);display:flex;align-items:center;justify-content:center;min-height:100vh}</style>
<script type="text/babel" data-presets="env,react">
const data=window.FCData;
function App(){
  const [active,setActive]=React.useState('home');
  const [blurred,setBlurred]=React.useState(false);
  const props={blurred,displayFont:'Geist',data,onNav:setActive,onTogglePrivacy:()=>setBlurred(b=>!b)};
  return (<window.FC.PhoneFrame>
    {active==='home'&&<window.FC.MobileHome {...props}/>}
    {active==='forecast'&&<window.FC.MobileForecast {...props}/>}
    {(active==='transactions'||active==='add')&&<window.FC.MobileTransactions {...props}/>}
    {active==='add'&&<window.FC.MobileAddSheet {...props}/>}
  </window.FC.PhoneFrame>);
}
function boot(){if(!window.FC?.PhoneFrame)return setTimeout(boot,30);ReactDOM.createRoot(document.getElementById('root')).render(<App/>);}
boot();
</script>
</body>
</html>
