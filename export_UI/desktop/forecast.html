<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="teal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finch — Forecast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-system)}*{box-sizing:border-box}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../data.js"></script>
<script type="text/babel" src="../components/atoms.jsx"></script>
<script type="text/babel" src="../components/desktop-shell.jsx"></script>
<script type="text/babel" src="../components/home-screen.jsx"></script>
<script type="text/babel" src="../components/forecast-screen.jsx"></script>
<script type="text/babel" src="../components/transactions-screen.jsx"></script>
<script type="text/babel" src="../components/goals-screen.jsx"></script>
<script type="text/babel" src="../components/secondary-screens.jsx"></script>
<script type="text/babel" src="../components/extra-screens.jsx"></script>
<script type="text/babel" data-presets="env,react">
const data=window.FCData;
function App(){
  const [active,setActive]=React.useState('forecast');
  const [blurred,setBlurred]=React.useState(false);
  const map={home:'HomeScreen',forecast:'ForecastScreen',transactions:'TransactionsScreen',goals:'GoalsScreen',accounts:'AccountsScreen',budgets:'BudgetsScreen',recurring:'RecurringScreen',investments:'InvestmentsScreen',networth:'NetWorthScreen',cards:'CardsScreen',import:'ImportScreen',simulator:'SimulatorScreen',profiles:'ProfilePickerScreen',onboarding:'OnboardingScreen'};
  const Screen=window.FC[map[active]]||window.FC.HomeScreen;
  return <window.FC.DesktopShell active={active} onNav={setActive} blurred={blurred} onTogglePrivacy={()=>setBlurred(b=>!b)} theme="dark" onToggleTheme={()=>{const t=document.documentElement.dataset.theme;document.documentElement.dataset.theme=t==='dark'?'light':'dark'}} accent="teal" onSetAccent={()=>{}} density="comfortable" profile={data.profile} query="" setQuery={()=>{}}><Screen blurred={blurred} density="comfortable" displayFont="Geist" data={data} onNav={setActive}/></window.FC.DesktopShell>;
}
function boot(){if(!window.FC?.DesktopShell||!window.FC.ProfilePickerScreen)return setTimeout(boot,30);ReactDOM.createRoot(document.getElementById('root')).render(<App/>);}
boot();
</script>
</body>
</html>
